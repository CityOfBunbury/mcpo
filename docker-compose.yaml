services:
  mcpo:
    build: .
    container_name: mcpo
    ports:
      - "${MCPO_PORT:-8005}:${MCPO_PORT:-8005}"
    env_file:
      - .env
    command: [
      "mcpo",
      "--host","0.0.0.0",
      "--port","${MCPO_PORT:-8005}",
      "--api-key","${MCPO_API_KEY}",
      "--config","/app/config/config.json",
      "--hot-reload"
    ]
    volumes:
      - ./mcpo:/app/config:ro
    restart: unless-stopped
